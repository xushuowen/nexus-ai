# Project Nexus Configuration
app:
  name: "Nexus AI"
  version: "0.1.0"
  host: "0.0.0.0"
  port: 8000
  debug: false

budget:
  daily_limit_tokens: 50000
  per_request_max_tokens: 2000
  curiosity_daily_ops: 10
  curiosity_per_op_tokens: 500
  warning_threshold: 0.8
  hard_stop: true
  reset_hour: 0

memory:
  working_memory_slots: 7
  episodic_max_entries: 1000
  semantic_decay_rate: 0.01
  hebbian_learning_rate: 0.1
  consolidation_interval_minutes: 30
  vector_store_path: "./data/chroma"
  sqlite_path: "./data/nexus.db"

orchestrator:
  max_parallel_hypotheses: 3
  confidence_threshold: 0.7
  auto_prune_below: 0.3
  simple_question_threshold: 0.85

providers:
  brain_mode: "gemini"   # "gemini" | "gemini_web" | "local" | "auto"
  primary: "gemini-flash"
  local_primary: "phi3-vision"
  fallback: "groq-llama"
  models:
    gemini-flash:
      model_id: "gemini/gemini-2.0-flash"
      max_tokens: 4096
      temperature: 0.7
      use_for: ["general", "routing", "simple_tasks", "classification", "analysis"]
    gemini-pro:
      model_id: "gemini/gemini-2.0-flash"
      max_tokens: 8192
      temperature: 0.7
      use_for: ["complex_reasoning", "code_generation"]
    gemini-vision:
      model_id: "openai/gpt-4o-mini"
      api_base: "https://models.inference.ai.azure.com"
      max_tokens: 4096
      temperature: 0.7
      use_for: ["vision"]
    github-gpt4o-mini:
      model_id: "openai/gpt-4o-mini"
      api_base: "https://models.inference.ai.azure.com"
      max_tokens: 4096
      temperature: 0.7
      use_for: []
    groq-llama:
      model_id: "groq/llama-3.3-70b-versatile"
      max_tokens: 2000
      temperature: 0.7
      use_for: ["fallback"]
    phi3-vision:
      model_id: "local/phi3-vision"
      max_tokens: 512
      temperature: 0.7
      use_for: ["local_chat", "local_vision"]
      model_path: "./models/llava-phi-3-mini-int4.gguf"
      mmproj_path: "./models/llava-phi-3-mini-mmproj-f16.gguf"
      n_threads: 4
      n_ctx: 4096

pyramid_memory:
  enabled: true
  db_path: "./data/pyramid.db"
  compression_interval_hours: 6
  daily_min_messages: 3        # min messages to trigger tier1 compression
  monthly_min_days: 3          # min daily summaries to trigger tier2
  context_max_chars: 8000
  retention_tier1_days: 90

security:
  sandbox_enabled: true
  allowed_paths:
    - "./data"
    - "./workspace"
  blocked_commands:
    - "rm -rf /"
    - "format"
    - "del /f /s /q"
  rate_limit_per_minute: 30

gateway:
  telegram:
    enabled: true
    token: ""
  web:
    enabled: true
  api:
    enabled: true

logging:
  level: "INFO"
  file: "./data/nexus.log"
